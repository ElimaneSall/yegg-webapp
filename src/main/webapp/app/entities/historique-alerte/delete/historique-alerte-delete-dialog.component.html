@if (historiqueAlerte) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(historiqueAlerte.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="historiqueAlerteDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirmation de suppression
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-historiqueAlerte-heading"
        jhiTranslate="yeggApp.historiqueAlerte.delete.question"
        [translateValues]="{ id: historiqueAlerte.id }"
      >
        Êtes-vous certain de vouloir supprimer le Historique Alerte {{ historiqueAlerte.id }} ?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
      </button>

      <button id="jhi-confirm-delete-historiqueAlerte" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Supprimer</span>
      </button>
    </div>
  </form>
}
